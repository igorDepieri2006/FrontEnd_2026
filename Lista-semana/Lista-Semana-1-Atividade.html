<html>
  <head>
    <title>Validação CPF</title>
    <style>
      body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background: #00ff00;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    #resultado {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .valido {
      color: green;
    }

    .invalido {
      color: red;
    }
    </style>
  </head>
  <body>
    <div class="container">
    <h1>Validador de CPF</h1>

    <input type="text" id="cpf" placeholder="Insira o CPF" maxlength="14" ></input>

    <button onclick="validarCPF()">Validar</button>

    <div id="resultado"></div>
  </div>
  </body>
  <script src="scriptCPF.js"></script>
</html>
