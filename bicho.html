<html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Pet Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body id="corpo" class="min-h-screen flex flex-col transition-all duration-1000" style="
    background-image: url('bg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
">

    <div class="w-full flex items-center justify-start p-6 gap-4 bg-black/20 backdrop-blur-sm">
        <div class="avatar">
            <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
                <img id="avatar-img" src="b_a.png" />
            </div>
        </div>
        <input type="text" placeholder="Nome da criatura..." class="input input-secondary bg-white/80" />

        <div class="ml-auto flex items-center gap-2">
            <span class="text-white font-bold">☀️</span>
            <input type="checkbox" class="toggle toggle-primary" id="toggle-clima" />
            <span class="text-white font-bold">🌙</span>
        </div>
    </div>

    <div class="flex-grow flex flex-col items-center justify-center w-full px-4 relative">

        <img id="b" src="b_n.png" alt="Pet" class="w-full max-w-md h-auto transition-transform duration-300" />

        <div class="mt-12 flex justify-center w-full">
            <img id="btn" src="btn.png" alt="Cookie"
                class="w-1/3 max-w-[150px] h-auto cursor-pointer active:scale-75 transition-transform hover:rotate-12"
                onclick="alimentar()" />
        </div>
    </div>

    <div id="area-secreta" style="text-align: left; margin-top: 20px; border: 2px dashed #cccccc00; padding: 20px;">
        <button id="btn-revelar">🎁</button>
        <div id="container-foto" style="margin-top: 30px;"></div>
    </div>
    <script src="script 2.js"></script>
</body>

</html>
