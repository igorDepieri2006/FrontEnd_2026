<html !DOCTYPE>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Temperatura</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: ff4800;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .campo {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #FF0000;
      border-radius: 5px;
    }
  </style>
  </head>
<body>

  <div class="container">
    <h1>Conversor Dinâmico</h1>

    <div class="campo">
      <label for="celsius">Celsius (°C)</label>
      <input type="number" id="celsius" step="0.1">
    </div>

    <div class="campo">
      <label for="fahrenheit">Fahrenheit (°F)</label>
      <input type="number" id="fahrenheit" step="0.1">
    </div>
  </div>
  </body>
  <script src="scriptTEMP.js"></script>
</html>
