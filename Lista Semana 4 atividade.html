<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Infinity Bank - Simulador</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      width: 400px;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .campo {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .resultado {
      margin-top: 25px;
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      border-left: 5px solid #007bff;
    }

    .resultado p {
      margin: 10px 0;
      font-size: 16px;
    }

    .destaque {
      font-weight: bold;
      color: #007bff;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Infinity Bank</h1>

    <div class="campo">
      <label for="bandeira">Bandeira do Cartão</label>
      <select id="bandeira">
        <option value="visa">Visa</option>
        <option value="master">Master</option>
        <option value="elo">Elo</option>
      </select>
    </div>

    <div class="campo">
      <label for="valor">Valor da Venda (R$)</label>
      <input type="number" id="valor" step="0.01" placeholder="Digite o valor">
    </div>

    <div class="campo">
      <label for="parcelas">Quantidade de Parcelas</label>
      <input type="number" id="parcelas" min="1" placeholder="Ex: 6">
    </div>

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado">
      <p>Preencha os dados para calcular.</p>
    </div>
  </div>
</body>
 <script src="scriptBank.js"></script>
</html>
